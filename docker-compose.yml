services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      STORE: postgres
      DATABASE_URL: "jdbc:postgresql://db:5432/shortener"
      DATABASE_USER: shortener
      DATABASE_PASSWORD: shortener
    ports:
      - "8080:8080"
